<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Vani</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Inter:wght@400;500&display=swap');

        :root {
            --bg-deep: #05201c;
            --bg-mid: #0b3d34;
            --bg-top: #14684f;
            --wire: #0e2420;
            --bulb-off: #123832;
            --amber: #ffb454;
            --rose: #ff5c7a;
            --gold-text: #eafff5;
            --muted: #9fd6c4;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 50%, var(--bg-deep) 100%);
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 32px 16px 48px;
            position: relative;
        }

        /* floating 3D heart particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            perspective: 600px;
            overflow: hidden;
        }

        .float-heart {
            position: absolute;
            bottom: -40px;
            background: var(--rose);
            opacity: 0.5;
        }

        .float-heart::before,
        .float-heart::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: inherit;
            border-radius: 50%;
        }

        .float-heart::before {
            left: -50%;
        }

        .float-heart::after {
            top: -50%;
        }

        .float-heart {
            width: 16px;
            height: 16px;
            transform: rotate(-45deg);
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translate3d(0, 0, 0) rotate(-45deg) scale(var(--depth-scale));
                opacity: 0;
            }

            10% {
                opacity: var(--depth-opacity);
            }

            90% {
                opacity: var(--depth-opacity);
            }

            100% {
                transform: translate3d(var(--drift), -110vh, 0) rotate(-45deg) scale(var(--depth-scale));
                opacity: 0;
            }
        }

        .stage {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 520px;
        }

        .eyebrow {
            color: var(--muted);
            font-size: 12px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            margin-bottom: 18px;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.2s forwards;
        }

        svg#heartSvg {
            width: 100%;
            height: auto;
            max-width: 440px;
            overflow: visible;
        }

        .wire-path {
            fill: none;
            stroke: var(--wire);
            stroke-width: 2;
            stroke-linecap: round;
        }

        .heart-photo {
            opacity: 0;
            filter: saturate(0.9) brightness(0.85);
            transition: opacity 1.4s ease, filter 1.4s ease;
        }

        .heart-photo.on {
            opacity: 1;
            filter: saturate(1) brightness(1);
        }

        .bulb-glow {
            fill: var(--bulb-off);
            filter: none;
            transition: fill 0.35s ease, filter 0.35s ease;
        }

        .bulb-glow.on.warm {
            fill: var(--amber);
            filter: drop-shadow(0 0 4px var(--amber)) drop-shadow(0 0 10px rgba(255, 180, 84, 0.85));
        }

        .bulb-glow.on.cool {
            fill: var(--rose);
            filter: drop-shadow(0 0 4px var(--rose)) drop-shadow(0 0 10px rgba(255, 92, 122, 0.85));
        }

        @keyframes flicker {
            0% {
                opacity: 0.2;
            }

            35% {
                opacity: 1;
            }

            45% {
                opacity: 0.4;
            }

            60% {
                opacity: 1;
            }

            100% {
                opacity: 1;
            }
        }

        .bulb-glow.on {
            animation: flicker 0.4s ease-out;
        }

        .heart-pulse {
            animation: none;
        }

        .heart-pulse.pulsing {
            animation: pulse 2.4s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.035);
            }
        }

        .message {
            text-align: center;
            margin-top: 28px;
            opacity: 0;
        }

        .message.reveal {
            animation: flicker 1.1s ease-out forwards;
        }

        .headline {
            font-family: 'Fraunces', serif;
            font-optical-sizing: auto;
            font-weight: 600;
            font-size: clamp(32px, 8vw, 52px);
            color: var(--gold-text);
            margin: 0 0 6px;
            letter-spacing: 0.01em;
        }

        .name {
            font-family: 'Fraunces', serif;
            font-weight: 300;
            font-style: italic;
            font-size: clamp(24px, 6vw, 34px);
            color: var(--amber);
            margin: 0 0 18px;
        }

        .subline {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 15px;
            color: var(--muted);
            max-width: 360px;
            line-height: 1.6;
            margin: 0 auto;
        }

        .switch-wrap {
            margin-top: 34px;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .switch-wrap.hidden {
            opacity: 0;
            pointer-events: none;
            height: 0;
            margin: 0;
            overflow: hidden;
        }

        .switch-btn {
            background: transparent;
            border: 1px solid var(--wire);
            color: var(--gold-text);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            padding: 14px 28px;
            border-radius: 999px;
            cursor: pointer;
            transition: border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
        }

        .switch-btn:hover {
            border-color: var(--amber);
            box-shadow: 0 0 18px rgba(255, 180, 84, 0.25);
        }

        .switch-btn:focus-visible {
            outline: 2px solid var(--amber);
            outline-offset: 3px;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            .bulb-glow.on,
            .message.reveal {
                animation: none;
                opacity: 1;
            }

            .heart-pulse.pulsing {
                animation: none;
            }

            .eyebrow {
                animation: none;
                opacity: 1;
            }
        }
    </style>
</head>

        </svg>

        <div class="message" id="message">
            <p class="headline">Happy Birthday</p>
            <p class="name">Vani</p>
            <p class="subline">Wishing you a year as bright as every one of these little lights — full of laughter,
                love, and moments worth lighting up for. Happy birthday, Vani. 🎂</p>
        </div>

        <div class="switch-wrap" id="switchWrap">
            <button class="switch-btn" id="switchBtn">turn on the lights</button>
        </div>
    </div>

    <script>
        (function () {
            // generate floating 3D heart particles with depth (size, blur, opacity, speed)
            const particlesEl = document.getElementById('particles');
            const heartCount = 22;
            for (let i = 0; i < heartCount; i++) {
                const h = document.createElement('div');
                h.className = 'float-heart';

                // depth: 0 = far away, 1 = close up
                const depth = Math.random();
                const size = 8 + depth * 26;              // 8px (far) to 34px (close)
                const blurAmt = (1 - depth) * 3.5;         // far hearts are blurrier
                const opacity = 0.15 + depth * 0.45;       // far hearts are fainter
                const duration = 14 - depth * 7;           // close hearts drift up faster
                const delay = Math.random() * 14;
                const leftPos = Math.random() * 100;
                const drift = (Math.random() * 160 - 80) + 'px';
                const hue = Math.random() > 0.5 ? 'var(--rose)' : 'var(--amber)';

                h.style.width = size + 'px';
                h.style.height = size + 'px';
                h.style.left = leftPos + '%';
                h.style.background = hue;
                h.style.filter = `blur(${blurAmt}px)`;
                h.style.setProperty('--depth-scale', (0.85 + depth * 0.3).toFixed(2));
                h.style.setProperty('--depth-opacity', opacity.toFixed(2));
                h.style.setProperty('--drift', drift);
                h.style.animationDuration = duration + 's';
                h.style.animationDelay = delay + 's';
                h.style.zIndex = Math.round(depth * 10);
                particlesEl.appendChild(h);
            }

            const svg = document.getElementById('heartSvg');
            const path = document.getElementById('wirePath');
            const svgNS = 'http://www.w3.org/2000/svg';
            const total = path.getTotalLength();
            const bulbCount = 26;
            const bulbs = [];

            // a tiny heart shape, centered at 0,0, roughly 14 units wide
            const miniHeartPath = 'M0,4.5 C-6,-2 -5,-8 0,-4.5 C5,-8 6,-2 0,4.5 Z';

            for (let i = 0; i < bulbCount; i++) {
                const dist = (i / bulbCount) * total;
                const pt = path.getPointAtLength(dist);
                const bulb = document.createElementNS(svgNS, 'path');
                bulb.setAttribute('d', miniHeartPath);
                bulb.setAttribute('transform', `translate(${pt.x}, ${pt.y}) scale(1.1)`);
                bulb.setAttribute('class', 'bulb-glow');
                svg.appendChild(bulb);
                bulbs.push(bulb);
            }

            const heart = svg; // pulse target
            const message = document.getElementById('message');
            const switchWrap = document.getElementById('switchWrap');
            const switchBtn = document.getElementById('switchBtn');

            let lit = false;

            function lightUp() {
                if (lit) return;
                lit = true;
                switchWrap.classList.add('hidden');

                const photo = document.getElementById('heartPhoto');
                setTimeout(() => { photo.classList.add('on'); }, 200);

                bulbs.forEach((b, i) => {
                    setTimeout(() => {
                        b.classList.add('on', i % 2 === 0 ? 'warm' : 'cool');
                    }, i * 90);
                });

                const totalDelay = bulbCount * 90 + 300;
                setTimeout(() => {
                    heart.classList.add('pulsing');
                    message.classList.add('reveal');
                }, totalDelay);
            }

            switchBtn.addEventListener('click', lightUp);

            // auto-start shortly after load, in case she doesn't notice the button
            setTimeout(() => {
                if (!lit) lightUp();
            }, 1800);
        })();
    </script>
